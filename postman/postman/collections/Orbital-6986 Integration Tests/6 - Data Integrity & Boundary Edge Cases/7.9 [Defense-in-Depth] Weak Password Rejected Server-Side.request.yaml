$kind: http-request
description: createAccountWithPassword in AppContext.tsx checks password.length < 6 CLIENT-SIDE before calling Firebase. This bypasses the app entirely and calls Firebase directly with a 3-character password, to confirm Firebase's own server-side validation is a real safety net, not just a UI nicety - unlike gaps 7.1-7.6, this one is expected to PASS in your favor.
url: https://identitytoolkit.googleapis.com/v1/accounts:signUp?key={{apiKey}}
method: POST
headers:
  Content-Type: application/json
queryParams:
  key: "{{apiKey}}"
body:
  type: json
  content: |-
    {
      "email": "postman-weakpw-{{$timestamp}}@example.com",
      "password": "123",
      "returnSecureToken": true
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Weak password is rejected server-side, independent of the app (400)', () => pm.response.code === 400);
      var json = pm.response.json();
      pm.test('Error indicates weak password', () => {
        pm.expect((json.error && json.error.message) || '').to.include('WEAK_PASSWORD');
      });
    language: text/javascript
order: 9000
