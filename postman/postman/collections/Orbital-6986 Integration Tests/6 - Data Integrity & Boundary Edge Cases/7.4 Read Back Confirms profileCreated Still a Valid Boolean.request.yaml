$kind: http-request
url: https://firestore.googleapis.com/v1/projects/{{projectId}}/databases/(default)/documents/users/{{uid}}
method: GET
headers:
  Authorization: Bearer {{idToken}}
scripts:
  - type: afterResponse
    code: |-
      var json = pm.response.json();
      pm.test('profileCreated is still the real boolean true from 2.1, rejected write had no effect', () => {
        pm.expect(json.fields.profileCreated.booleanValue).to.equal(true);
        pm.expect(json.fields.profileCreated.stringValue).to.equal(undefined);
      });
    language: text/javascript
order: 4000
