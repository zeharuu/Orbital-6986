$kind: http-request
description: No Authorization header at all. Rules require request.auth != null, so this must be denied.
url: https://firestore.googleapis.com/v1/projects/{{projectId}}/databases/(default)/documents/users/{{uid}}
method: GET
scripts:
  - type: afterResponse
    code: pm.test('Unauthenticated read is denied (403)', () => pm.response.code === 403);
    language: text/javascript
order: 1000
