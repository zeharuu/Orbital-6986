$kind: http-request
description: addFood/removeFood only ever produce positive integers, but nothing on the server stops a direct write of a negative count. Correctness on the dashboard relies entirely on the client-side filter `(loggedCounts[f.id] || 0) > 0` in AppContext.tsx:324 - there is no server-side guarantee.
url: https://firestore.googleapis.com/v1/projects/{{projectId}}/databases/(default)/documents/users/{{uid}}?updateMask.fieldPaths=logs.postmanTestDate
method: PATCH
headers:
  Content-Type: application/json
  Authorization: Bearer {{idToken}}
queryParams:
  updateMask.fieldPaths: logs.postmanTestDate
body:
  type: json
  content: |-
    {
      "fields": {
        "logs": {
          "mapValue": {
            "fields": {
              "postmanTestDate": {
                "mapValue": {
                  "fields": {
                    "1": { "integerValue": "-5" }
                  }
                }
              }
            }
          }
        }
      }
    }
scripts:
  - type: afterResponse
    code: pm.test('Firestore accepts a negative log count with no rejection (200)', () => pm.response.code === 200);
    language: text/javascript
order: 5000
