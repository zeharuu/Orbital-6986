$kind: http-request
description: firestore.rules now requires data.profileCreated is bool. Writing it as the string 'false' - which would have silently type-confused the app's `if (data.profileCreated)` truthiness check - is now rejected at the database layer.
url: https://firestore.googleapis.com/v1/projects/{{projectId}}/databases/(default)/documents/users/{{uid}}?updateMask.fieldPaths=profileCreated
method: PATCH
headers:
  Content-Type: application/json
  Authorization: Bearer {{idToken}}
queryParams:
  updateMask.fieldPaths: profileCreated
body:
  type: json
  content: |-
    {
      "fields": {
        "profileCreated": { "stringValue": "false" }
      }
    }
scripts:
  - type: afterResponse
    code: pm.test('Firestore now rejects type-mismatched profileCreated (403)', () => pm.response.code === 403);
    language: text/javascript
order: 3000
