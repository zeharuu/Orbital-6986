$kind: http-request
description: Flips the case of every letter in testEmail (matching the app's own lowercasing behavior in AppContext.tsx's getTrimmedEmail) and confirms sign-in still succeeds and resolves to the same uid.
url: https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key={{apiKey}}
method: POST
headers:
  Content-Type: application/json
queryParams:
  key: "{{apiKey}}"
body:
  type: json
  content: |-
    {
      "email": "{{_mixedCaseEmail}}",
      "password": "{{testPassword}}",
      "returnSecureToken": true
    }
scripts:
  - type: beforeRequest
    code: |-
      var email = pm.environment.get('testEmail');
      var mixed = email.split('').map(function (c) {
        return /[a-z]/.test(c) ? c.toUpperCase() : c;
      }).join('');
      pm.environment.set('_mixedCaseEmail', mixed);
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test('Mixed-case email still signs in successfully (200)', function () {
        pm.expect(pm.response.code).to.equal(200);
      });
      var json = pm.response.json();
      pm.test('Resolves to the same uid regardless of email case', function () {
        pm.expect(json.localId).to.equal(pm.environment.get('uid'));
      });
    language: text/javascript
order: 2000
