$kind: http-request
description: Firebase Auth passwords are case-sensitive (hashed comparison). Flips the case of every letter in testPassword and confirms sign-in is rejected. Run after '1 - Auth' so Test User A already exists.
url: https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key={{apiKey}}
method: POST
headers:
  Content-Type: application/json
queryParams:
  key: "{{apiKey}}"
body:
  type: json
  content: |-
    {
      "email": "{{testEmail}}",
      "password": "{{_wrongCasePassword}}",
      "returnSecureToken": true
    }
scripts:
  - type: beforeRequest
    code: |-
      var pw = pm.environment.get('testPassword');
      var flipped = pw.split('').map(function (c) {
        return c === c.toUpperCase() ? c.toLowerCase() : c.toUpperCase();
      }).join('');
      pm.environment.set('_wrongCasePassword', flipped);
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test('Wrong-case password is rejected (400)', function () {
        pm.expect(pm.response.code).to.equal(400);
      });
      var json = pm.response.json();
      pm.test('Error indicates invalid credentials', function () {
        pm.expect(['INVALID_LOGIN_CREDENTIALS', 'INVALID_PASSWORD', 'EMAIL_NOT_FOUND']).to.include(json.error && json.error.message);
      });
    language: text/javascript
order: 1000
