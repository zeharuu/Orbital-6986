$kind: http-request
name: "3.3 Add Same Meal Again (addFood: 1 -> 2)"
description: "Mirrors clicking '+ Add to Log' a second time on the same item: count goes from 1 to 2, same as addFood's (prev[id] || 0) + 1 branch."
url: https://firestore.googleapis.com/v1/projects/{{projectId}}/databases/(default)/documents/users/{{uid}}?updateMask.fieldPaths=logs.postmanTestDate
method: PATCH
headers:
  Content-Type: application/json
  Authorization: Bearer {{idToken}}
queryParams:
  updateMask.fieldPaths: logs.postmanTestDate
body:
  type: json
  content: |-
    {
      "fields": {
        "logs": {
          "mapValue": {
            "fields": {
              "postmanTestDate": {
                "mapValue": {
                  "fields": {
                    "1": { "integerValue": "2" }
                  }
                }
              }
            }
          }
        }
      }
    }
scripts:
  - type: afterResponse
    code: pm.test('Second add write succeeded (200)', () => pm.response.code === 200);
    language: text/javascript
order: 3000
